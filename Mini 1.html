<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>CSS Gradient Generator</title>

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:Arial,sans-serif;
}

body{
    background:#0f172a;
    color:white;
    min-height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
    padding:20px;
}

.container{
    width:900px;
    max-width:100%;
    background:#111827;
    padding:25px;
    border-radius:16px;
    display:grid;
    grid-template-columns:300px 1fr;
    gap:20px;
    box-shadow:0 0 30px rgba(0,0,0,.3);
}

.controls{
    display:flex;
    flex-direction:column;
    gap:20px;
}

.control-group{
    display:flex;
    flex-direction:column;
    gap:8px;
}

label{
    font-size:14px;
    color:#cbd5e1;
}

input[type="color"]{
    width:100%;
    height:50px;
    border:none;
    border-radius:10px;
    cursor:pointer;
}

input[type="range"]{
    width:100%;
}

.preview-section{
    display:flex;
    flex-direction:column;
    gap:20px;
}

.preview{
    height:300px;
    border-radius:14px;
    background:linear-gradient(135deg,#6a11cb,#ff6ec4);
}

.code-box{
    background:#1e293b;
    padding:15px;
    border-radius:10px;
    position:relative;
}

code{
    color:#60a5fa;
    word-break:break-all;
}

button{
    margin-top:12px;
    background:#6d28d9;
    color:white;
    border:none;
    padding:10px 15px;
    border-radius:8px;
    cursor:pointer;
}

button:hover{
    opacity:.9;
}

#message{
    color:#22c55e;
    margin-top:8px;
    font-size:14px;
}
</style>
</head>
<body>

<div class="container">

    <div class="controls">

        <div class="control-group">
            <label>Color 1</label>
            <input type="color" id="color1" value="#6a11cb">
        </div>

        <div class="control-group">
            <label>Color 2</label>
            <input type="color" id="color2" value="#ff6ec4">
        </div>

        <div class="control-group">
            <label>Angle: <span id="angleValue">135</span>°</label>
            <input type="range" id="angle" min="0" max="360" value="135">
        </div>

    </div>

    <div class="preview-section">

        <div class="preview" id="preview"></div>

        <div class="code-box">
            <code id="cssCode"></code>
            <br>
            <button id="copyBtn">Copy CSS</button>
            <div id="message"></div>
        </div>

    </div>

</div>

<script>
const color1 = document.getElementById("color1");
const color2 = document.getElementById("color2");
const angle = document.getElementById("angle");
const preview = document.getElementById("preview");
const cssCode = document.getElementById("cssCode");
const angleValue = document.getElementById("angleValue");
const copyBtn = document.getElementById("copyBtn");
const message = document.getElementById("message");

function updateGradient() {

    const gradient =
        `linear-gradient(${angle.value}deg, ${color1.value}, ${color2.value})`;

    preview.style.background = gradient;

    cssCode.textContent =
        `background: ${gradient};`;

    angleValue.textContent = angle.value;
}

color1.addEventListener("input", updateGradient);
color2.addEventListener("input", updateGradient);
angle.addEventListener("input", updateGradient);

copyBtn.addEventListener("click", async () => {

    try {
        await navigator.clipboard.writeText(cssCode.textContent);

        message.textContent = "✓ CSS copied to clipboard";

        setTimeout(() => {
            message.textContent = "";
        }, 2000);

    } catch(err) {
        message.textContent = "Clipboard copy failed";
    }
});

updateGradient();
</script>

</body>
</html>
